<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Flex-Stays Luxury Hotel</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
    
    <style>
        body {
            background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 50%, #7dd3fc 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            font-family: 'Inter', sans-serif;
        }
        
        .auth-container {
            width: 100%;
            max-width: 480px;
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1.5px solid rgba(10, 191, 172, 0.4);
            border-radius: 20px;
            box-shadow: 0 24px 64px rgba(15, 23, 42, 0.15);
            padding: 48px;
            color: #0f172a;
            animation: authFadeUp 0.6s ease;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: #09a898;
            text-decoration: none;
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        .auth-logo-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(10, 191, 172, 0.15);
            border: 1px solid #09a898;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-title {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            color: #0f172a;
            margin: 0 0 8px;
            font-weight: 500;
        }
        .auth-subtitle {
            font-size: 13.5px;
            color: rgba(15, 23, 42, 0.65);
            margin: 0;
        }

        .form-group {
            margin-bottom: 22px;
            position: relative;
        }
        .form-group label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
            color: #09a898;
            margin-bottom: 8px;
        }
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-wrapper i.left-icon {
            position: absolute;
            left: 14px;
            color: rgba(15, 23, 42, 0.4);
            width: 16px;
            height: 16px;
            pointer-events: none;
        }
        .input-wrapper input {
            width: 100%;
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(15, 23, 42, 0.15);
            border-radius: 8px;
            padding: 12px 16px 12px 42px;
            color: #0f172a;
            font-size: 13.5px;
            outline: none;
            transition: all 0.2s ease;
        }
        .input-wrapper input:focus {
            border-color: #0ABFAC;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 10px rgba(10, 191, 172, 0.15);
        }
        .input-wrapper input.has-error {
            border-color: #ef4444;
        }

        .password-toggle-btn {
            position: absolute;
            right: 14px;
            background: transparent;
            border: none;
            color: rgba(15, 23, 42, 0.4);
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            transition: color 0.2s;
        }
        .password-toggle-btn:hover {
            color: #09a898;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            margin-bottom: 28px;
        }
        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: rgba(15, 23, 42, 0.7);
        }
        .remember-me input {
            accent-color: #0ABFAC;
            cursor: pointer;
        }
        .forgot-link {
            color: #09a898;
            text-decoration: none;
            font-weight: 500;
        }
        .forgot-link:hover {
            text-decoration: underline;
        }

        .error-message {
            color: #ef4444;
            font-size: 12px;
            margin-top: 4px;
            display: none;
        }

        .btn-auth-submit {
            width: 100%;
            background: #0ABFAC;
            color: #0d2a2a;
            border: none;
            padding: 12px 24px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-auth-submit:hover {
            background: #09a898;
            box-shadow: 0 8px 24px rgba(10, 191, 172, 0.3);
        }

        .auth-divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 28px 0;
            color: rgba(15, 23, 42, 0.4);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .auth-divider::before, .auth-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(15, 23, 42, 0.1);
        }
        .auth-divider:not(:empty)::before { margin-right: 12px; }
        .auth-divider:not(:empty)::after { margin-left: 12px; }

        .social-buttons {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }
        .social-btn {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(15, 23, 42, 0.15);
            border-radius: 24px;
            color: #0f172a;
            padding: 10px 20px;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .social-btn:hover {
            background: rgba(255, 255, 255, 0.85);
            border-color: rgba(10, 191, 172, 0.5);
        }
        .social-btn svg {
            width: 16px;
            height: 16px;
        }

        .auth-footer {
            text-align: center;
            margin-top: 32px;
            font-size: 13.5px;
            color: rgba(15, 23, 42, 0.65);
        }
        .auth-footer a {
            color: #09a898;
            text-decoration: none;
            font-weight: 600;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }

        /* Toast Alert */
        .auth-toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #ef4444;
            color: #fff;
            padding: 14px 24px;
            border-radius: 8px;
            font-size: 13.5px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 1000000;
            animation: authToastIn 0.3s ease;
            display: none;
        }
        .auth-toast.show {
            display: flex;
        }

        @keyframes authFadeUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes authToastIn {
            from { transform: translateY(12px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="auth-container">
        
        <div class="auth-header">
            <a href="index.html" class="auth-logo">
                <div class="auth-logo-icon">
                    <i data-lucide="hotel" style="width:16px;height:16px;"></i>
                </div>
                <span>Flex-Stays</span>
            </a>
            <h2 class="auth-title">Welcome Back</h2>
            <p class="auth-subtitle">Sign in to manage your luxury stays and culinary dining</p>
        </div>

        <form id="loginForm" novalidate>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-wrapper">
                    <i data-lucide="mail" class="left-icon"></i>
                    <input type="email" id="email" required autocomplete="email">
                </div>
                <span class="error-message" id="emailErr">Please enter a valid email address</span>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <i data-lucide="lock" class="left-icon"></i>
                    <input type="password" id="password" required autocomplete="current-password">
                    <button type="button" class="password-toggle-btn" tabindex="-1">
                        <i data-lucide="eye" style="width:16px;height:16px;"></i>
                    </button>
                </div>
                <span class="error-message" id="passwordErr">Password is required</span>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" id="rememberMe">
                    <span>Remember Me</span>
                </label>
                <a href="forgot-password.html" class="forgot-link">Forgot Password?</a>
            </div>

            <button type="submit" class="btn-auth-submit">Sign In</button>

        </form>

        <div class="auth-divider">Or continue with</div>

        <div class="social-buttons">
            <div class="google-btn-wrapper" style="position: relative; display: inline-block; width: 100%;">
                <button class="social-btn" id="customGoogleBtn" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;">
                    <svg viewBox="0 0 24 24" style="width: 16px; height: 16px;">
                        <path fill="#EA4335" d="M12.24 10.285V14.4h6.887c-.648 2.41-2.519 4.114-5.187 4.114-3.5 0-6.34-2.84-6.34-6.34s2.84-6.34 6.34-6.34c1.616 0 3.087.61 4.22 1.616l2.97-2.97C18.665 2.112 15.617 1 12.24 1 6.04 1 1 6.04 1 12.24s5.04 11.24 11.24 11.24c5.8 0 10.8-4.17 10.8-11.24 0-.71-.06-1.4-.19-1.955H12.24z"/>
                    </svg>
                    <span>Continue with Google</span>
                </button>
                <div id="googleBtnContainer" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.01; z-index: 10; cursor: pointer; overflow: hidden; display: flex; align-items: center; justify-content: center;"></div>
            </div>
            <button class="social-btn" onclick="mockSocial('Microsoft')">
                <svg viewBox="0 0 23 23">
                    <path fill="#F25022" d="M0 0h11v11H0z"/>
                    <path fill="#7FBA00" d="M12 0h11v11H12z"/>
                    <path fill="#00A4EF" d="M0 12h11v11H0z"/>
                    <path fill="#FFB900" d="M12 12h11v11H12z"/>
                </svg>
                <span>Continue with Microsoft</span>
            </button>
            <button class="social-btn" onclick="mockSocial('Apple')">
                <svg viewBox="0 0 18 24">
                    <path fill="#fff" d="M15.54 13.56c.04 3.01 2.63 4.01 2.66 4.03-.02.08-.41 1.41-1.37 2.8-1.07 1.56-2.18 3.12-3.92 3.15-1.71.03-2.26-1.01-4.22-1.01-1.96 0-2.57 1.01-4.22 1.01-1.7.03-2.95-1.71-4.03-3.26-2.2-3.17-3.87-8.98-1.6-12.92 1.13-1.96 3.15-3.2 5.34-3.23 1.66-.02 3.23 1.13 4.25 1.13 1.01 0 2.91-1.39 4.93-1.18.84.03 3.22.34 4.75 2.58-.12.07-2.85 1.66-2.82 4.93M11.96 3.75c.9-1.09 1.51-2.61 1.34-4.13-1.3.05-2.88.86-3.81 1.95-.8.93-1.5 2.47-1.31 3.97 1.45.11 2.92-.7 3.78-1.79"/>
                </svg>
                <span>Continue with Apple</span>
            </button>
        </div>

        <div class="auth-footer">
            Don't have an account? <a href="signup.html">Create Account</a>
        </div>
        <div class="auth-footer" style="margin-top: 8px; font-size: 12px; color: rgba(255,255,255,0.35);">
            🔒 Staff member? Use your staff email &amp; password above.
        </div>

    </div>

    <!-- Error Toast -->
    <div class="auth-toast" id="errorToast">
        <i data-lucide="alert-circle" style="width:18px;height:18px;"></i>
        <span id="toastMsg">Something went wrong!</span>
    </div>

    <!-- Shared Session Script -->
    <script src="auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();

            if (window.initGoogleSignIn) {
                window.initGoogleSignIn();
            }

            // Prefill email if saved in Remember Me
            const savedEmail = localStorage.getItem('rememberedEmail');
            const emailInput = document.getElementById('email');
            const rememberCheckbox = document.getElementById('rememberMe');
            
            if (savedEmail && emailInput) {
                emailInput.value = savedEmail;
                if (rememberCheckbox) rememberCheckbox.checked = true;
            }

            // Password visibility toggle
            const pwdToggle = document.querySelector('.password-toggle-btn');
            if (pwdToggle) {
                pwdToggle.addEventListener('click', () => {
                    const input = pwdToggle.previousElementSibling;
                    const type = input.type === 'password' ? 'text' : 'password';
                    input.type = type;
                    const icon = pwdToggle.querySelector('i');
                    if (type === 'text') {
                        icon.setAttribute('data-lucide', 'eye-off');
                    } else {
                        icon.setAttribute('data-lucide', 'eye');
                    }
                    lucide.createIcons();
                });
            }

            // ═══════════════════════════════════════════════════
            //  UNIFIED LOGIN — checks staffUsers first, then users
            // ═══════════════════════════════════════════════════
            const form = document.getElementById('loginForm');
            form.addEventListener('submit', (e) => {
                e.preventDefault();

                const emailEl  = document.getElementById('email');
                const passEl   = document.getElementById('password');
                const emailVal = emailEl.value.trim().toLowerCase();
                const passVal  = passEl.value;

                // Clear error states
                emailEl.classList.remove('has-error');
                passEl.classList.remove('has-error');
                document.getElementById('emailErr').style.display = 'none';
                document.getElementById('passwordErr').style.display = 'none';

                // Validate fields
                let isValid = true;
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(emailVal)) {
                    document.getElementById('emailErr').style.display = 'block';
                    emailEl.classList.add('has-error');
                    isValid = false;
                }
                if (!passVal) {
                    document.getElementById('passwordErr').style.display = 'block';
                    passEl.classList.add('has-error');
                    isValid = false;
                }
                if (!isValid) return;

                const loginTimestamp = new Date().toISOString();

                const API_BASE = 'http://localhost:8080/api/v1';

                // Try Staff Login first
                fetch(`${API_BASE}/auth/staff/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: emailVal, password: passVal })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        const resData = data.data;
                        const session = {
                            token: resData.token,
                            email: resData.email,
                            role: resData.role.toLowerCase(),
                            firstName: resData.firstName,
                            lastName: resData.lastName,
                            loginTimestamp: loginTimestamp
                        };
                        localStorage.setItem('currentUser', JSON.stringify(session));
                        
                        if (rememberCheckbox && rememberCheckbox.checked) {
                            localStorage.setItem('rememberedEmail', emailVal);
                        } else {
                            localStorage.removeItem('rememberedEmail');
                        }

                        showToast(`Welcome, ${resData.firstName}! Redirecting to dashboard...`);
                        
                        const dashMap = {
                            admin:        'admin-dashboard.html',
                            reception:    'reception-dashboard.html',
                            housekeeping: 'housekeeping-dashboard.html',
                            maintenance:  'maintenance-dashboard.html',
                            manager:      'manager-dashboard.html'
                        };
                        const dest = dashMap[session.role] || 'index.html';
                        setTimeout(() => { window.location.href = dest; }, 1000);
                    } else {
                        // If Staff login failed, try Guest login
                        return fetch(`${API_BASE}/auth/login`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email: emailVal, password: passVal })
                        })
                        .then(res => res.json())
                        .then(guestData => {
                            if (guestData.success) {
                                const resData = guestData.data;
                                const session = {
                                    token: resData.token,
                                    email: resData.email,
                                    role: 'guest',
                                    firstName: resData.firstName,
                                    lastName: resData.lastName,
                                    loginTimestamp: loginTimestamp
                                };
                                localStorage.setItem('currentUser', JSON.stringify(session));
                                
                                if (rememberCheckbox && rememberCheckbox.checked) {
                                    localStorage.setItem('rememberedEmail', emailVal);
                                } else {
                                    localStorage.removeItem('rememberedEmail');
                                }

                                showToast(`Welcome back, ${resData.firstName}!`);
                                setTimeout(() => { window.location.href = 'index.html'; }, 800);
                            } else {
                                showToast('Invalid email or password. Please try again.');
                                passEl.classList.add('has-error');
                            }
                        });
                    }
                })
                .catch(err => {
                    console.error(err);
                    showToast('Connection error. Is the backend server running?');
                });
            });
        });

        function showToast(msg) {
            const toast = document.getElementById('errorToast');
            const msgSpan = document.getElementById('toastMsg');
            if (toast && msgSpan) {
                msgSpan.textContent = msg;
                toast.classList.add('show');
                setTimeout(() => { toast.classList.remove('show'); }, 4000);
            }
        }

        function mockSocial(provider) {
            if (provider === 'Google') {
                const mockUser = {
                    firstName: 'Vineeth',
                    lastName: '',
                    email: 'vineeth@google.com',
                    mobile: '9999999999',
                    password: 'password123'
                };
                
                let users = [];
                try {
                    users = JSON.parse(localStorage.getItem('users') || '[]');
                } catch(e) {}
                
                const exists = users.some(u => u.email.toLowerCase() === mockUser.email.toLowerCase());
                if (!exists) {
                    users.push(mockUser);
                    localStorage.setItem('users', JSON.stringify(users));
                }
                
                localStorage.setItem('currentUser', JSON.stringify(mockUser));
                localStorage.removeItem('guestCheckout');
                
                showToast('Successfully signed in with Google!');
                setTimeout(() => {
                    if (window.resumeIntendedAction) {
                        window.resumeIntendedAction();
                    } else {
                        window.location.href = 'index.html';
                    }
                }, 1000);
            } else {
                showToast(`${provider} login authentication is in Sandbox/Mock Mode.`);
            }
        }
    </script>
</body>
</html>
